<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGHV - Acceso</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0f0f0f; color: #fff; font-family: 'Segoe UI', sans-serif; }
        .login-box { max-width: 420px; margin: 10vh auto; background: #1a1a1a; border: 1px solid #333; border-radius: 14px; padding: 30px; }
        .btn-warning { font-weight: bold; }
    </style>
</head>
<body>
    <div class="login-box">
        <h3 class="text-warning text-center mb-4">SGHV - ACCESO</h3>
        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label">Usuario</label>
                <input type="text" id="id_usuario" class="form-control" required autocomplete="username" value="admin">
            </div>
            <div class="mb-3">
                <label class="form-label">Contraseña</label>
                <input type="password" id="password" class="form-control" required autocomplete="current-password" value="admin123">
            </div>
            <button type="submit" class="btn btn-warning w-100">INGRESAR</button>
        </form>
    </div>

    <script>
        const API_URL = '';

        if (localStorage.getItem('token')) {
            window.location.replace('/index.html');
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const id_usuario = document.getElementById('id_usuario').value.trim();
            const password = document.getElementById('password').value;

            try {
                const res = await fetch(`/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id_usuario, password })
                });

                const data = await res.json();

                if (!res.ok || !data.success) {
                    alert(data.message || 'Error al iniciar sesión');
                    return;
                }

                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));
                window.location.replace('/index.html');
            } catch (error) {
                console.error('Error:', error);
                alert('Error de conexión con el servidor');
            }
        });
    </script>
</body>
</html>
